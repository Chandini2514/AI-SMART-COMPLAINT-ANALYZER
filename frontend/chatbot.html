<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Complaint Analyzer - Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f1f5f9; }
        nav { background: #2563eb; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        .logout { background: white; color: #2563eb; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        .container { width: 90%; margin: 40px auto; }
        h1 { color: #1e3a8a; margin-bottom: 25px; }
        .chat-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .messages { min-height: 300px; border: 1px solid #ccc; border-radius: 12px; padding: 20px; margin-bottom: 20px; background: #f9fafb; overflow-y: auto; }
        .message { margin-bottom: 18px; }
        .message.user { text-align: right; }
        .message .bubble { display: inline-block; max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .message.user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .message.bot .bubble { background: #e2e8f0; color: #111827; border-bottom-left-radius: 4px; }
        textarea { width: 100%; min-height: 120px; padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1; resize: none; font-size: 15px; }
        button { margin-top: 15px; background: #2563eb; color: white; border: none; padding: 14px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <nav>
        <h2>🤖 AI Complaint Analyzer</h2>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="complaint.html">Complaint</a>
            <a href="history.html">History</a>
            <a href="chatbot.html">Chatbot</a>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1>Complaint Chatbot</h1>
        <div class="chat-box">
            <div class="messages" id="chatMessages">
                <div class="message bot"><div class="bubble">Hello! Tell me your complaint or ask how to resolve it.</div></div>
            </div>
            <textarea id="chatInput" placeholder="Type your complaint or question here..."></textarea>
            <button onclick="sendChat()">Send</button>
        </div>
    </div>

    <script>
        function logout() {
            alert('Logged out successfully!');
            window.location.href = 'index.html';
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const messageEl = document.createElement('div');
            messageEl.classList.add('message', sender);
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;
            messageEl.appendChild(bubble);
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/chatbot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }

                const data = await response.json();
                const bot = data.response;
                addMessage(`Category: ${bot.category}\nPriority: ${bot.priority}\nSentiment: ${bot.sentiment}\nSuggestion: ${bot.suggestion}`, 'bot');
            } catch (error) {
                console.error(error);
                addMessage('Sorry, I could not process that. Please try again.', 'bot');
            }
        }
    </script>
</body>
</html>
